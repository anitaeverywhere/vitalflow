<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>VitalFlow — Meta Semanal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    /* Bar chart */
    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: .5rem;
      height: 160px;
      padding: 0 .25rem;
    }
    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .35rem;
      height: 100%;
      justify-content: flex-end;
    }
    .bar-fill {
      width: 100%;
      border-radius: 6px 6px 0 0;
      min-height: 4px;
      transition: height .6s cubic-bezier(.4,0,.2,1);
    }
    .bar-fill.water    { background: linear-gradient(180deg,#81d4fa,#0288d1); }
    .bar-fill.exercise { background: linear-gradient(180deg,#ce93d8,var(--purple)); }
    .bar-label {
      font-size: .72rem;
      font-weight: 800;
      color: var(--gray-400);
      text-transform: capitalize;
    }
    .bar-val {
      font-size: .7rem;
      font-weight: 800;
      color: var(--gray-600);
    }
    .bar-wrap { flex:1; display:flex; align-items:flex-end; }

    .chart-legend {
      display: flex; gap: 1.25rem; margin-bottom: 1rem;
    }
    .legend-dot {
      display: flex; align-items: center; gap: .4rem;
      font-size: .82rem; font-weight: 700; color: var(--gray-600);
    }
    .legend-dot::before {
      content: '';
      width: 10px; height: 10px;
      border-radius: 2px;
    }
    .legend-dot.water::before    { background: #0288d1; }
    .legend-dot.exercise::before { background: var(--purple); }

    .week-summary {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      gap: .75rem;
      margin-bottom: 1.75rem;
    }
    .week-stat {
      background: var(--card-bg);
      border: 1.5px solid var(--mint);
      border-radius: var(--r-md);
      padding: 1rem;
    }
    .week-stat .ws-label { font-size:.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--gray-400); margin-bottom:.3rem; }
    .week-stat .ws-val   { font-size:1.5rem; font-weight:900; color:var(--gray-900); }
    .week-stat .ws-unit  { font-size:.78rem; color:var(--gray-400); font-weight:600; }

    .day-row {
      display: grid;
      grid-template-columns: 80px 1fr 1fr 60px 60px;
      gap: .75rem;
      align-items: center;
      padding: .65rem .75rem;
      border-radius: var(--r-sm);
      border-bottom: 1px solid var(--gray-100);
      font-size: .85rem;
    }
    .day-row:last-child { border-bottom: none; }
    .day-row.today { background: var(--purple-light); }
    .day-row .day-name { font-weight:800; color:var(--gray-900); text-transform:capitalize; }
    .day-row .day-name small { display:block; font-size:.72rem; color:var(--gray-400); font-weight:600; }
    .day-row .day-pct { font-size:.78rem; font-weight:800; text-align:right; }
    .day-row .day-pct.done { color:var(--success); }
    .day-row .day-pct.miss { color:var(--gray-400); }
  </style>
</head>
<body>
<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">Vital<span>Flow</span></div>
    <div class="sidebar-user">
      <div class="avatar" id="sidebarAvatar">?</div>
      <div class="sidebar-user-text">
        <div class="name" id="sidebarName">—</div>
        <div class="email" id="sidebarEmail">—</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Principal</div>
      <a class="nav-item" href="dashboard.html" data-label="Início"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Início</a>
      <a class="nav-item" href="meta-hoje.html" data-label="Meta de hoje"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="10" width="4" height="11" rx="1"/><rect x="10" y="6" width="4" height="15" rx="1"/><rect x="17" y="2" width="4" height="19" rx="1"/></svg>Meta de hoje</a>
      <a class="nav-item active" href="meta-semanal.html" data-label="Meta semanal"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Meta semanal</a>
      <div class="nav-section-label">Registrar</div>
      <a class="nav-item" href="agua.html" data-label="Adicionar água"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 8 2 13a10 10 0 0 0 20 0C22 8 17.52 2 12 2z"/></svg>Adicionar água</a>
      <a class="nav-item" href="treino.html" data-label="Adicionar treino"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="5" r="2"/><path d="M12 7v5l3 3"/><line x1="5" y1="17" x2="19" y2="17"/></svg>Adicionar treino</a>
      <div class="nav-section-label">Configurar</div>
      <a class="nav-item" href="definir-meta.html" data-label="Definir metas"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><polyline points="3 6 4 7 6 5"/><polyline points="3 12 4 13 6 11"/><polyline points="3 18 4 19 6 17"/></svg>Definir metas</a>
      <a class="nav-item" href="habitos.html" data-label="Análise de hábitos"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>Análise de hábitos</a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" id="logoutBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sair da conta</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <!-- desktop collapse toggle -->
      <button class="sidebar-toggle-btn" id="sidebarToggleBtn" aria-label="Recolher menu" aria-expanded="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <!-- mobile hamburger -->
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Abrir menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="topbar-title">Meta Semanal</span>
      <div class="topbar-right">
        <span style="font-size:.85rem;color:var(--gray-400);font-weight:700;">Últimos 7 dias</span>
      </div>
    </header>

    <div class="page-body">
      <!-- summary stats -->
      <div class="week-summary" id="weekSummary"></div>

      <!-- charts -->
      <div class="two-col" style="margin-bottom:1.75rem;">
        <div class="card">
          <div class="section-label">Água — litros por dia</div>
          <div class="chart-legend">
            <span class="legend-dot water">Água (ml)</span>
          </div>
          <div class="bar-chart" id="waterChart"></div>
        </div>
        <div class="card">
          <div class="section-label">Treino — minutos por dia</div>
          <div class="chart-legend">
            <span class="legend-dot exercise">Exercício (min)</span>
          </div>
          <div class="bar-chart" id="exChart"></div>
        </div>
      </div>

      <!-- day-by-day table -->
      <div class="card">
        <div class="section-label" style="margin-bottom:.75rem;">Detalhamento por dia</div>
        <div style="display:grid;grid-template-columns:80px 1fr 1fr 60px 60px;gap:.75rem;padding:.4rem .75rem;font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--gray-400);">
          <span>Dia</span><span>Água</span><span>Treino</span><span style="text-align:right">H₂O</span><span style="text-align:right">🏋️</span>
        </div>
        <div id="dayTable"></div>
      </div>
    </div>
  </div>
</div>

<div class="mobile-overlay" id="mobileOverlay"></div>
<div id="toast-container"></div>
<script src="js/app.js"></script>
<script>
  VF.requireAuth();
  VF.initSidebar('meta-semanal.html');

  const week  = VF.weekData();
  const goals = VF.getGoals();

  /* summary */
  const totalW   = week.reduce((s,d) => s + d.water, 0);
  const totalE   = week.reduce((s,d) => s + d.exercise, 0);
  const daysW    = week.filter(d => d.water    >= goals.water).length;
  const daysE    = week.filter(d => d.exercise >= goals.exercise).length;

  document.getElementById('weekSummary').innerHTML = `
    <div class="week-stat"><div class="ws-label">Água total</div><div class="ws-val">${(totalW/1000).toFixed(1)}</div><div class="ws-unit">litros</div></div>
    <div class="week-stat"><div class="ws-label">Treino total</div><div class="ws-val">${totalE}</div><div class="ws-unit">minutos</div></div>
    <div class="week-stat"><div class="ws-label">Dias c/ meta água</div><div class="ws-val">${daysW}/7</div><div class="ws-unit">dias</div></div>
    <div class="week-stat"><div class="ws-label">Dias c/ meta treino</div><div class="ws-val">${daysE}/7</div><div class="ws-unit">dias</div></div>
  `;

  /* bar chart helper */
  function buildChart(containerId, data, max, cls) {
    const c = document.getElementById(containerId);
    c.innerHTML = data.map(d => {
      const h = max ? Math.round((d.val / max) * 140) : 4;
      return `<div class="bar-col">
        <div class="bar-val">${d.val}</div>
        <div class="bar-wrap"><div class="bar-fill ${cls}" style="height:${Math.max(h,4)}px"></div></div>
        <div class="bar-label">${d.label}</div>
      </div>`;
    }).join('');
  }

  const maxW = Math.max(...week.map(d => d.water), goals.water);
  const maxE = Math.max(...week.map(d => d.exercise), goals.exercise);

  buildChart('waterChart', week.map(d => ({ val: d.water, label: d.label })), maxW, 'water');
  buildChart('exChart',    week.map(d => ({ val: d.exercise, label: d.label })), maxE, 'exercise');

  /* day table */
  const todayLabel = new Date().toLocaleDateString('pt-BR', { weekday: 'short' });
  document.getElementById('dayTable').innerHTML = week.map(d => {
    const wPct = Math.min(100, Math.round(d.water    / goals.water    * 100));
    const ePct = Math.min(100, Math.round(d.exercise / goals.exercise * 100));
    const isToday = d.label === todayLabel;
    return `<div class="day-row ${isToday ? 'today' : ''}">
      <span class="day-name">${d.label}${isToday ? '<small>Hoje</small>' : ''}</span>
      <div class="progress-wrap"><div class="progress-track" style="height:8px;"><div class="progress-fill fill-water" style="width:${wPct}%"></div></div></div>
      <div class="progress-wrap"><div class="progress-track" style="height:8px;"><div class="progress-fill fill-exercise" style="width:${ePct}%"></div></div></div>
      <span class="day-pct ${wPct >= 100 ? 'done' : 'miss'}">${wPct}%</span>
      <span class="day-pct ${ePct >= 100 ? 'done' : 'miss'}">${ePct}%</span>
    </div>`;
  }).join('');
</script>
</body>
</html>
